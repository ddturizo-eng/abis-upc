<section class="admin-section plantillas-page">
  <div class="plt-topbar">
    <div class="plt-topbar-left">
      <span class="material-symbols-outlined plt-topbar-icon">stylus_note</span>
      <div>
        <h1 class="plt-topbar-title">Plantillas</h1>
      </div>
    </div>
    <div class="plt-topbar-cards" id="plantillasGrid"></div>
  </div>

  <div class="plt-editor" id="pltEditor" style="display:none">
    <div class="plt-tokens">
      <span class="plt-tokens-label">Variables:</span>
      <div class="plt-tokens-row" id="pltVarsRow"></div>
    </div>
    <div class="plt-workspace">
      <div class="plt-sidebar">
        <div class="plt-sidebar-header">Editor</div>
        <div class="plt-zones" id="zonasEditor"></div>
      </div>
      <div class="plt-canvas">
        <div class="plt-canvas-header">
          <span>Vista previa del documento</span>
        </div>
        <div class="plt-canvas-body">
          <div class="plt-document" id="previewContainer"></div>
        </div>
      </div>
    </div>
    <div class="plt-bottombar">
      <span id="plantillaStatus" class="plt-bottombar-status">
        <span class="plt-status-dot"></span>
        <span>Cambios sin guardar</span>
      </span>
      <div class="plt-bottombar-actions">
        <button class="plt-btn plt-btn-ghost" onclick="PlantillasAdmin.cancelar()">Cancelar</button>
        <button class="plt-btn plt-btn-primary" id="btnGuardarPlantilla" onclick="PlantillasAdmin.guardar()">
          <span class="material-symbols-outlined">save</span> Guardar cambios
        </button>
      </div>
    </div>
  </div>
</section>

<style>
  .plantillas-page { width: 100%; padding: 16px 20px 0 !important; height: calc(100vh - 76px); display: flex; flex-direction: column; overflow: hidden; max-width: none !important; }
  .plantillas-page.admin-section { width: 100%; height: calc(100vh - 76px); display: flex; flex-direction: column; overflow: hidden; max-width: none !important; }

  .plt-topbar { width: 100%; display: flex; align-items: center; gap: 16px; flex-shrink: 0; margin-bottom: 10px; }
  .plt-topbar-left { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .plt-topbar-icon { font-size: 26px; color: #145332; }
  .plt-topbar-title { font-size: 17px; font-weight: 700; color: #1a1a1a; margin: 0; }
  .plt-topbar-cards { display: flex; gap: 6px; flex: 1; min-width: 0; overflow-x: auto; }

  .plt-tcard { display: flex; align-items: center; gap: 8px; padding: 8px 14px; border: 1px solid #e5e7eb; border-radius: 9px; background: transparent; cursor: pointer; white-space: nowrap; transition: all .15s; flex-shrink: 0; font-size: 12px; font-weight: 500; color: #6b7280; }
  .plt-tcard:hover { border-color: #9ca3af; color: #374151; }
  .plt-tcard.selected { border-color: #145332; background: #fff; color: #145332; font-weight: 500; }
  .plt-tcard .material-symbols-outlined { font-size: 17px; }
  .plt-tcard.selected .material-symbols-outlined { color: #145332; }
  .plt-tcard h3 { font-size: 12px; font-weight: inherit; color: inherit; margin: 0; }
  .plt-badge { font-size: 9px; font-weight: 600; padding: 1px 7px; border-radius: 10px; margin-left: 2px; white-space: nowrap; }
  .plt-badge-prod { background: #e6f4ec; color: #145332; }
  .plt-badge-prod::before { content: ''; display: inline-block; width: 5px; height: 5px; background: #145332; border-radius: 50%; margin-right: 4px; vertical-align: middle; animation: plt-pulse 2s ease-in-out infinite; }
  .plt-badge-pend { background: #f3f4f6; color: #6b7280; }
  @keyframes plt-pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }

  .plt-editor { width: 100%; flex: 1; display: flex; flex-direction: column; border: .5px solid #e5e7eb; border-radius: 10px; background: #fff; overflow: hidden; min-height: 0; }
  .plt-tokens { display: flex; align-items: center; gap: 6px; padding: 8px 14px; border-bottom: 1px solid #f3f4f6; overflow-x: auto; flex-shrink: 0; background: #fff; border-radius: 10px 10px 0 0; }

  .plt-tokens-row { display: flex; gap: 5px; flex-wrap: wrap; }
  .plt-var-chip { background: #e6f4ec; color: #145332; border: 1px solid #b7dcc8; border-radius: 14px; padding: 2px 9px; font-size: 10px; font-family: 'JetBrains Mono', 'Consolas', monospace; cursor: pointer; white-space: nowrap; transition: all .15s; }
  .plt-var-chip:hover { background: #145332; color: #fff; border-color: #145332; }

  .plt-workspace { display: flex; flex: 1; min-height: 0; }
  .plt-sidebar { width: 340px; min-width: 340px; display: flex; flex-direction: column; border-right: .5px solid #e5e7eb; min-height: 0; }
  .plt-sidebar-header { padding: 10px 14px; font-size: 10px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: .8px; border-bottom: 1px solid #f3f4f6; flex-shrink: 0; background: #fafbfc; }
  .plt-zones { padding: 10px 10px 16px 10px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 10px; }

  .plt-zone { border: 1px solid #f3f4f6; border-radius: 10px; padding: 14px; background: #fff; }
  .plt-zone-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .plt-zone-header-left { display: flex; align-items: center; gap: 8px; }
  .plt-zone-accent { width: 3px; height: 18px; background: #145332; border-radius: 2px; flex-shrink: 0; }
  .plt-zone-header strong { font-size: 10px; text-transform: uppercase; letter-spacing: .6px; color: #374151; font-weight: 600; }
  .plt-zone-badge { font-size: 9px; color: #145332; background: #e6f4ec; padding: 1px 7px; border-radius: 8px; font-weight: 500; }
  .plt-zone textarea { width: 100%; border: 1px solid #e5e7eb; border-radius: 8px; padding: 8px 10px; font-size: 12px; font-family: Georgia, 'Times New Roman', serif; resize: vertical; min-height: 72px; outline: none; box-sizing: border-box; color: #374151; transition: border-color .15s, box-shadow .15s; }
  .plt-zone textarea:focus { border-color: #145332; box-shadow: 0 0 0 2px rgba(20,83,50,.1); }
  .plt-zone-controls { display: flex; gap: 6px; align-items: center; margin-top: 8px; flex-wrap: wrap; }
  .plt-zone-controls label { font-size: 10px; color: #6b7280; display: flex; align-items: center; gap: 2px; }
  .plt-zone-controls input[type=color] { width: 24px; height: 24px; border: 0; border-radius: 5px; cursor: pointer; padding: 0; background: #fff; appearance: none; }
  .plt-zone-controls input[type=color]::-webkit-color-swatch-wrapper { padding: 0; }
  .plt-zone-controls input[type=color]::-webkit-color-swatch { border: 1px solid #d1d5db; border-radius: 4px; }
  .plt-zone-controls input[type=number] { font-size: 11px; border: 1px solid #e5e7eb; border-radius: 6px; padding: 3px 6px; width: 52px; text-align: center; outline: none; }
  .plt-zone-controls input[type=number]:focus { border-color: #145332; box-shadow: 0 0 0 2px rgba(20,83,50,.1); }
  .plt-toggle-group { display: inline-flex; border: 1px solid #e5e7eb; border-radius: 6px; overflow: hidden; }
  .plt-toggle-btn { padding: 3px 8px; font-size: 10px; border: 0; background: #fff; color: #9ca3af; cursor: pointer; border-right: 1px solid #e5e7eb; font-weight: 500; transition: all .1s; }

  .plt-toggle-btn.active { background: #e6f4ec; color: #145332; font-weight: 600; }
  .plt-switch { display: flex; align-items: center; gap: 3px; font-size: 10px; color: #6b7280; cursor: pointer; }
  .plt-switch input[type=checkbox] { accent-color: #145332; width: 13px; height: 13px; }

  .plt-canvas { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; background: #f5f5f4; }
  .plt-canvas-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; font-size: 12px; font-weight: 500; color: #374151; border-bottom: 1px solid #f3f4f6; flex-shrink: 0; background: #fff; }

  .plt-document { width: 100%; background: #fff; box-shadow: 0 0 0 1px rgba(0,0,0,.04), 0 2px 8px rgba(0,0,0,.04); padding: 44px 48px; overflow-wrap: break-word; border-radius: 8px; }
  .plt-document * { max-width: 100%; box-sizing: border-box; }

  .plt-bottombar { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; border-top: 1px solid #f3f4f6; background: #fff; flex-shrink: 0; }
  .plt-bottombar-status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #92400e; }
  .plt-bottombar-status.saved { color: #145332; }
  .plt-status-dot { width: 7px; height: 7px; border-radius: 50%; background: #f59e0b; flex-shrink: 0; }
  .plt-bottombar-status.saved .plt-status-dot { background: #145332; }
  .plt-bottombar-actions { display: flex; gap: 8px; }
  .plt-btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 16px; border-radius: 8px; font-size: 12px; font-weight: 500; cursor: pointer; border: 0; font-family: inherit; transition: all .15s; }
  .plt-btn-primary { background: #145332; color: #fff; }
  .plt-btn-primary:hover { background: #0f3f26; }
  .plt-btn-ghost { background: #fff; color: #374151; border: 1px solid #e5e7eb; }
  .plt-btn-ghost:hover { background: #f3f4f6; }

  /* scrollbars personalizados */
  .plt-zones::-webkit-scrollbar { width: 5px; }
  .plt-zones::-webkit-scrollbar-track { background: transparent; }
  .plt-zones::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
  .plt-zones::-webkit-scrollbar-thumb:hover { background: #9ca3af; }

  .plt-canvas-body::-webkit-scrollbar { width: 6px; }
  .plt-canvas-body::-webkit-scrollbar-track { background: transparent; }
  .plt-canvas-body::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
  .plt-canvas-body::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
</style>
