<section class="admin-section">
  <div class="bg-white rounded-xl shadow-[0px_10px_30px_rgba(0,77,51,0.08)] p-6">
    <div class="flex items-center justify-between gap-4">
      <div>
        <h1 class="text-2xl font-bold text-[#004D33] font-dm">Modo de votacion</h1>
        <p class="text-sm text-slate-400 mt-1 font-dm">La jornada se opera desde la pantalla kiosko oficial.</p>
      </div>
      <button type="button" id="btn-open-kiosk" class="rounded-lg bg-[#004D33] px-5 py-3 text-sm font-bold text-white">
        Abrir modo votacion
      </button>
    </div>
    <div id="votacion-admin-message" class="mt-4 hidden rounded-lg border border-amber-200 bg-amber-50 p-3 text-sm text-amber-700"></div>
  </div>
</section>

<script>
  (function initAdminVotacionRedirect() {
    const button = document.getElementById('btn-open-kiosk');
    const message = document.getElementById('votacion-admin-message');

    async function openKiosk() {
      try {
        await API.get('/api/votacion/activa');
        window.open('/pages/votacion/index.html', 'ABISVotacionKiosko', 'noopener,noreferrer');
      } catch (error) {
        message.textContent = error.message || 'No hay una eleccion en curso para abrir el modo votacion.';
        message.classList.remove('hidden');
      }
    }

    button?.addEventListener('click', openKiosk);
  })();
</script>
