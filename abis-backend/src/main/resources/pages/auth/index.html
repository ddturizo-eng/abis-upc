<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABIS-UPC | Pre-Registro Biométrico</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #060d1f;
            color: #e0e6f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px;
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
        }
        .header .logo { font-size: 2rem; margin-bottom: 6px; }
        .header h1 { font-size: 1.3rem; color: #60a5fa; letter-spacing: 1px; }
        .header p  { color: #475569; font-size: 0.78rem; margin-top: 4px; }

        .card {
            background: #0f1829;
            border: 1px solid #1e3a5f;
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 620px;
            box-shadow: 0 0 60px rgba(59,130,246,0.08);
        }

        /* ── Status ── */
        .system-status {
            display: flex; align-items: center; gap: 8px;
            background: #0a1628; border: 1px solid #1e3a5f;
            border-radius: 8px; padding: 10px 14px;
            margin-bottom: 22px; font-size: 0.78rem; color: #64748b;
        }
        .dot { width:8px; height:8px; border-radius:50%; background:#94a3b8; flex-shrink:0; }
        .dot.ok    { background:#22c55e; box-shadow:0 0 6px #22c55e88; }
        .dot.error { background:#ef4444; box-shadow:0 0 6px #ef444488; }
        .dot.pulse { background:#f59e0b; animation:blink 1s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

        /* ── Pestañas de entrada ── */
        .tabs {
            display: flex; gap: 4px;
            background: #0a1222; border: 1px solid #1e3a5f;
            border-radius: 10px; padding: 4px;
            margin-bottom: 20px;
        }
        .tab-btn {
            flex: 1; padding: 10px 8px;
            background: transparent; border: none; border-radius: 7px;
            color: #475569; font-size: 0.82rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s; letter-spacing: 0.3px;
        }
        .tab-btn.active {
            background: #1e3a5f; color: #93c5fd;
        }
        .tab-btn:hover:not(.active) { color: #93c5fd; }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* ── Drop Zone ── */
        .drop-zone {
            border: 2px dashed #1e3a5f; border-radius: 10px;
            padding: 26px 20px; text-align: center; cursor: pointer;
            transition: all 0.25s; margin-bottom: 18px; background: #0a1222;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: #3b82f6; background: #0d1e3a;
        }
        .drop-zone input { display: none; }
        .drop-zone .icon { font-size: 2rem; margin-bottom: 8px; }
        .drop-zone label {
            cursor: pointer; color: #64748b;
            font-size: 0.85rem; display: block;
        }
        .drop-zone label span { color: #3b82f6; text-decoration: underline; }

        #preview {
            max-width: 100%; max-height: 150px; border-radius: 8px;
            margin-top: 12px; display: none; border: 1px solid #1e3a5f;
        }
        #filename-label {
            display: none; font-size: 0.75rem;
            color: #475569; margin-top: 5px;
        }

        /* ── Cámara ── */
        .camara-wrapper { position: relative; margin-bottom: 18px; }
        #video-preview {
            width: 100%; border-radius: 10px;
            border: 1px solid #1e3a5f; background: #000;
            display: none; max-height: 280px; object-fit: cover;
        }
        #canvas-capture { display: none; }
        .camara-controles {
            display: flex; gap: 10px; margin-top: 10px;
        }
        .btn-cam {
            flex: 1; padding: 11px;
            background: #0d1e3a; border: 1px solid #1e3a5f;
            border-radius: 8px; color: #93c5fd;
            font-size: 0.85rem; font-weight: 600; cursor: pointer;
            transition: all 0.2s;
        }
        .btn-cam:hover { background: #1e3a5f; }
        .btn-cam:disabled { opacity: 0.4; cursor: not-allowed; }
        #camara-thumb {
            max-width: 100%; max-height: 130px; border-radius: 8px;
            margin-top: 10px; display: none; border: 1px solid #1e3a5f;
        }

        /* ── Botón escanear ── */
        button#btnScan {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white; border: none; border-radius: 10px;
            font-size: 1rem; font-weight: 700; cursor: pointer;
            letter-spacing: 0.5px; transition: all 0.2s;
        }
        button#btnScan:hover:not(:disabled) {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            transform: translateY(-1px);
        }
        button#btnScan:disabled {
            background: #1e2d45; color: #334155;
            cursor: not-allowed; transform: none;
        }

        /* ── Error ── */
        #error-msg {
            display: none; background: #1a0a0a;
            border: 1px solid #7f1d1d; border-radius: 8px;
            padding: 12px 14px; color: #fca5a5;
            font-size: 0.82rem; margin-top: 14px;
        }

        /* ── Sección formulario pre-registro ── */
        .form-section {
            display: none; margin-top: 26px;
        }
        .form-section-title {
            font-size: 0.82rem; font-weight: 700;
            color: #60a5fa; letter-spacing: 0.5px;
            margin-bottom: 14px;
            display: flex; align-items: center; gap: 8px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group.full { grid-column: 1 / -1; }
        .form-group label {
            font-size: 0.75rem; color: #475569; letter-spacing: 0.3px;
        }
        .form-group input, .form-group select {
            background: #0a1222; border: 1px solid #1e3a5f;
            border-radius: 8px; padding: 10px 12px;
            color: #e0e6f0; font-size: 0.88rem;
            transition: border-color 0.2s; outline: none;
            font-family: inherit;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: #3b82f6;
        }
        .form-group input.autofilled {
            border-color: #22c55e;
            background: #041810;
        }
        .form-group select option { background: #0f1829; }

        .badge-tipo {
            display: inline-block; padding: 2px 10px;
            border-radius: 20px; font-size: 0.72rem; font-weight: 700;
        }
        .badge-ti  { background:#0c2045; color:#60a5fa; border:1px solid #1e4a8f; }
        .badge-cc  { background:#052e16; color:#4ade80; border:1px solid #16a34a; }
        .badge-upc { background:#3d1f00; color:#fbbf24; border:1px solid #92400e; }
        .badge-unk { background:#1a0a0a; color:#f87171; border:1px solid #991b1b; }

        .btn-submit {
            width: 100%; padding: 14px; margin-top: 20px;
            background: linear-gradient(135deg, #059669, #047857);
            color: white; border: none; border-radius: 10px;
            font-size: 0.95rem; font-weight: 700; cursor: pointer;
            letter-spacing: 0.5px; transition: all 0.2s;
        }
        .btn-submit:hover { background: linear-gradient(135deg, #10b981, #059669); transform: translateY(-1px); }

        /* ── OCR resultado (mini) ── */
        .ocr-resultado-mini {
            display: none; margin-top: 14px;
            background: #071220; border: 1px solid #1e3a5f;
            border-radius: 10px; overflow: hidden;
        }
        .ocr-mini-header {
            background: #0d1e3a; padding: 9px 14px;
            font-size: 0.78rem; font-weight: 700;
            color: #60a5fa; letter-spacing: 0.4px;
        }
        .ocr-mini-body {
            padding: 12px 14px; font-size: 0.8rem; color: #64748b;
        }

        /* ── Flujo ── */
        .flow {
            display: flex; justify-content: center; align-items: center;
            gap: 6px; margin-top: 20px;
            font-size: 0.7rem; color: #334155;
        }
        .flow .step {
            background: #0d1829; border: 1px solid #1e3a5f;
            border-radius: 6px; padding: 4px 10px;
        }
        .flow .step.active { border-color: #3b82f6; color: #60a5fa; }
        .flow .arrow { color: #1e3a5f; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">🗳️</div>
    <h1>ABIS-UPC</h1>
    <p>Pre-Registro Biométrico · Escaneo OCR de Documentos</p>
</div>

<div class="card">

    <!-- Estado del sistema -->
    <div class="system-status">
        <div class="dot pulse" id="statusDot"></div>
        <span id="statusText">Verificando conexión con el backend...</span>
    </div>

    <!-- Pestañas: Imagen/PDF | Cámara -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('archivo')">📂 Imagen / PDF</button>
        <button class="tab-btn"        onclick="switchTab('camara')">📷 Cámara</button>
    </div>

    <!-- Panel: Archivo -->
    <div class="tab-panel active" id="panel-archivo">
        <div class="drop-zone" id="dropZone">
            <input type="file" id="fileInput" accept="image/*,.pdf">
            <div class="icon">📄</div>
            <label for="fileInput">
                Arrastra aquí o <span>haz clic para explorar</span><br>
                <small style="color:#334155;font-size:0.72rem">PNG, JPG, WEBP, PDF</small>
            </label>
            <img id="preview" alt="Vista previa">
            <p id="filename-label"></p>
        </div>
    </div>

    <!-- Panel: Cámara -->
    <div class="tab-panel" id="panel-camara">
        <div class="camara-wrapper">
            <video id="video-preview" autoplay playsinline></video>
            <canvas id="canvas-capture"></canvas>
            <img id="camara-thumb" alt="Captura">
        </div>
        <div class="camara-controles">
            <button class="btn-cam" id="btnIniciarCamara" onclick="iniciarCamara()">
                📷 Activar cámara
            </button>
            <button class="btn-cam" id="btnCapturar" onclick="capturarFoto()" disabled>
                🎯 Capturar foto
            </button>
            <button class="btn-cam" id="btnDetenerCamara" onclick="detenerCamara()" disabled style="flex:0.6">
                ✕ Cerrar
            </button>
        </div>
    </div>

    <!-- Botón escanear -->
    <button id="btnScan" disabled>🧬 Escanear Documento</button>
    <div id="error-msg"></div>

    <!-- Resultado mini OCR (fuente y tipo) -->
    <div class="ocr-resultado-mini" id="ocrMini">
        <div class="ocr-mini-header">📋 Datos extraídos — revisión antes de registrar</div>
        <div class="ocr-mini-body" id="ocrMiniBody"></div>
    </div>

    <!-- Formulario de Pre-Registro -->
    <div class="form-section" id="formSection">
        <div class="form-section-title">
            ✏️ FORMULARIO DE PRE-REGISTRO
            <span id="badge-tipo" class="badge-tipo badge-unk">—</span>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label>Tipo de documento</label>
                <select id="f-tipo">
                    <option value="CC">Cédula de Ciudadanía (C.C.)</option>
                    <option value="TI">Tarjeta de Identidad (T.I.)</option>
                    <option value="CE">Cédula de Extranjería</option>
                    <option value="PASAPORTE">Pasaporte</option>
                </select>
            </div>
            <div class="form-group">
                <label>Número de documento</label>
                <input type="text" id="f-numero" placeholder="Ej: 1.052.041.109">
            </div>
            <div class="form-group">
                <label>Apellidos</label>
                <input type="text" id="f-apellidos" placeholder="Apellidos">
            </div>
            <div class="form-group">
                <label>Nombres</label>
                <input type="text" id="f-nombres" placeholder="Nombres">
            </div>
            <div class="form-group">
                <label>Fecha de nacimiento</label>
                <input type="text" id="f-nacimiento" placeholder="Ej: 13 JUN 2006">
            </div>
            <div class="form-group">
                <label>Sexo</label>
                <select id="f-sexo">
                    <option value="">— Sin especificar —</option>
                    <option value="M">Masculino</option>
                    <option value="F">Femenino</option>
                </select>
            </div>
            <div class="form-group full">
                <label>Programa / Facultad (si aplica)</label>
                <input type="text" id="f-programa" placeholder="Ej: Ingeniería de Sistemas">
            </div>
        </div>

        <button class="btn-submit" onclick="enviarRegistro()">
            🗳️ Confirmar Pre-Registro
        </button>
    </div>

    <!-- Flujo -->
    <div class="flow">
        <div class="step" id="f-front">Frontend JS</div>
        <div class="arrow">→</div>
        <div class="step" id="f-java">Java :7000</div>
        <div class="arrow">→</div>
        <div class="step" id="f-python">Python :8000</div>
    </div>

</div>

<script>
    // ─── Estado global ───────────────────────────────────────────────────────
    let archivoActual  = null;  // File o Blob listo para enviar
    let streamCamara   = null;

    // ─── Health check ─────────────────────────────────────────────────────────
    async function checkHealth() {
        try {
            const resp = await fetch('/api/health');
            const data = await resp.json();
            if (data.biometric === 'ok') {
                setStatus('ok', '✅ Backend Java y Microservicio Python operativos');
                activateFlow('f-java'); activateFlow('f-python');
            } else {
                setStatus('error', '⚠️ Backend Java OK · Python offline');
                activateFlow('f-java');
            }
        } catch {
            setStatus('error', '❌ Backend Java no responde · ¿Puerto 7000 activo?');
        }
    }

    function setStatus(tipo, texto) {
        document.getElementById('statusDot').className = 'dot ' + tipo;
        document.getElementById('statusText').textContent = texto;
    }

    function activateFlow(id) {
        document.getElementById(id)?.classList.add('active');
    }

    // ─── Pestañas ─────────────────────────────────────────────────────────────
    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach((b, i) =>
            b.classList.toggle('active', (tab === 'archivo' ? i===0 : i===1))
        );
        document.getElementById('panel-archivo').classList.toggle('active', tab === 'archivo');
        document.getElementById('panel-camara').classList.toggle('active', tab === 'camara');

        // Si cambia a archivo, detener cámara
        if (tab === 'archivo' && streamCamara) detenerCamara();
        resetUI();
    }

    // ─── Drag & Drop / Archivo ────────────────────────────────────────────────
    const dropZone  = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const preview   = document.getElementById('preview');
    const fnLabel   = document.getElementById('filename-label');

    dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file) cargarArchivo(file);
    });
    fileInput.addEventListener('change', () => { if (fileInput.files[0]) cargarArchivo(fileInput.files[0]); });

    function cargarArchivo(file) {
        archivoActual = file;
        const esPDF = file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf');

        if (esPDF) {
            preview.style.display = 'none';
            fnLabel.textContent = `📑 ${file.name} (${(file.size/1024).toFixed(1)} KB) — PDF`;
        } else {
            preview.src = URL.createObjectURL(file);
            preview.style.display = 'block';
            fnLabel.textContent = `📄 ${file.name} (${(file.size/1024).toFixed(1)} KB)`;
        }
        fnLabel.style.display = 'block';
        document.getElementById('btnScan').disabled = false;
        resetResultados();
        activateFlow('f-front');
    }

    // ─── Cámara ───────────────────────────────────────────────────────────────
    const video    = document.getElementById('video-preview');
    const canvas   = document.getElementById('canvas-capture');
    const camaraThumb = document.getElementById('camara-thumb');

    async function iniciarCamara() {
        try {
            streamCamara = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', width:{ideal:1920}, height:{ideal:1080} }
            });
            video.srcObject = streamCamara;
            video.style.display = 'block';
            document.getElementById('btnCapturar').disabled = false;
            document.getElementById('btnDetenerCamara').disabled = false;
            document.getElementById('btnIniciarCamara').disabled = true;
        } catch(e) {
            mostrarError('No se pudo acceder a la cámara: ' + e.message);
        }
    }

    function capturarFoto() {
        if (!streamCamara) return;
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        canvas.toBlob(blob => {
            archivoActual = new File([blob], 'captura.jpg', { type: 'image/jpeg' });
            camaraThumb.src = URL.createObjectURL(blob);
            camaraThumb.style.display = 'block';
            document.getElementById('btnScan').disabled = false;
            resetResultados();
            activateFlow('f-front');
        }, 'image/jpeg', 0.92);
    }

    function detenerCamara() {
        if (streamCamara) {
            streamCamara.getTracks().forEach(t => t.stop());
            streamCamara = null;
        }
        video.style.display = 'none';
        document.getElementById('btnCapturar').disabled = true;
        document.getElementById('btnDetenerCamara').disabled = true;
        document.getElementById('btnIniciarCamara').disabled = false;
    }

    // ─── Escaneo OCR ──────────────────────────────────────────────────────────
    document.getElementById('btnScan').addEventListener('click', async () => {
        if (!archivoActual) return;

        const btnScan = document.getElementById('btnScan');
        btnScan.disabled = true;
        btnScan.textContent = '⏳ Procesando...';
        resetResultados();

        try {
            const formData = new FormData();
            formData.append('file', archivoActual);

            const resp = await fetch('/api/ocr/scan', { method:'POST', body:formData });
            const data = await resp.json();

            if (data.error) throw new Error(data.error);

            rellenarFormulario(data);
            mostrarOcrMini(data);
            document.getElementById('formSection').style.display = 'block';

        } catch(err) {
            mostrarError('❌ ' + err.message);
        } finally {
            btnScan.disabled = false;
            btnScan.textContent = '🧬 Escanear Documento';
        }
    });

    // ─── Rellenar formulario ──────────────────────────────────────────────────
    function rellenarFormulario(data) {
        // Tipo de documento
        const fTipo = document.getElementById('f-tipo');
        const tipo  = (data.tipo_doc || '').toUpperCase();
        if (['CC','TI','CE','PASAPORTE'].includes(tipo)) fTipo.value = tipo;

        // Badge
        const badgeTipo = document.getElementById('badge-tipo');
        badgeTipo.textContent = data.label_tipo || tipo;
        const badgeClases = { TI:'badge-ti', CC:'badge-cc', CARNET_UPC:'badge-upc' };
        badgeTipo.className = 'badge-tipo ' + (badgeClases[tipo] || 'badge-unk');

        // Campos de texto
        const mapeo = {
            'f-numero'    : data.numero_id,
            'f-apellidos' : data.apellidos,
            'f-nombres'   : data.nombres,
            'f-nacimiento': data.fecha_nacimiento,
        };

        for (const [id, valor] of Object.entries(mapeo)) {
            const el = document.getElementById(id);
            if (valor && valor !== 'No detectado' && valor !== '—') {
                el.value = valor;
                el.classList.add('autofilled');
            } else {
                el.value = '';
                el.classList.remove('autofilled');
            }
        }

        // Sexo
        const fSexo = document.getElementById('f-sexo');
        if (data.sexo === 'M' || data.sexo === 'F') {
            fSexo.value = data.sexo;
        }
    }

    function mostrarOcrMini(data) {
        const fuente = data.fuente || 'desconocido';
        const fuenteLabel = fuente === 'tesseract'
            ? '<span style="color:#4ade80">✅ TESSERACT LIVE</span>'
            : '<span style="color:#fb923c">⚠️ MOCK / OCR fallido</span>';

        document.getElementById('ocrMiniBody').innerHTML =
            `Fuente: ${fuenteLabel} &nbsp;|&nbsp; `
            + `Tipo detectado: <strong style="color:#93c5fd">${data.label_tipo || '—'}</strong> &nbsp;|&nbsp; `
            + `Nombre: <strong style="color:#e2e8f0">${data.nombre_completo || '—'}</strong> &nbsp;|&nbsp; `
            + `ID: <strong style="color:#e2e8f0">${data.numero_id || '—'}</strong>`
            + (data.nota ? `<br><span style="color:#f87171;margin-top:4px;display:block">⚠️ ${data.nota}</span>` : '');

        document.getElementById('ocrMini').style.display = 'block';
    }

    // ─── Enviar pre-registro ──────────────────────────────────────────────────
    async function enviarRegistro() {
        const payload = {
            tipo_doc   : document.getElementById('f-tipo').value,
            numero_id  : document.getElementById('f-numero').value,
            apellidos  : document.getElementById('f-apellidos').value,
            nombres    : document.getElementById('f-nombres').value,
            nacimiento : document.getElementById('f-nacimiento').value,
            sexo       : document.getElementById('f-sexo').value,
            programa   : document.getElementById('f-programa').value,
        };

        // Validación mínima
        if (!payload.numero_id || !payload.nombres) {
            mostrarError('⚠️ Número de documento y nombres son obligatorios.');
            return;
        }

        try {
            // Ajusta este endpoint a tu ruta real en Java
            const resp = await fetch('/api/registro/preregistro', {
                method : 'POST',
                headers: { 'Content-Type': 'application/json' },
                body   : JSON.stringify(payload),
            });
            const data = await resp.json();
            if (data.error) throw new Error(data.error);
            alert('✅ Pre-registro enviado correctamente.\n' + JSON.stringify(data, null, 2));
        } catch(err) {
            mostrarError('Error al enviar registro: ' + err.message);
        }
    }

    // ─── Helpers ──────────────────────────────────────────────────────────────
    function mostrarError(msg) {
        const el = document.getElementById('error-msg');
        el.innerHTML = msg;
        el.style.display = 'block';
    }

    function resetResultados() {
        document.getElementById('error-msg').style.display = 'none';
        document.getElementById('ocrMini').style.display = 'none';
        document.getElementById('formSection').style.display = 'none';
    }

    function resetUI() {
        archivoActual = null;
        preview.style.display = 'none';
        fnLabel.style.display = 'none';
        camaraThumb.style.display = 'none';
        document.getElementById('btnScan').disabled = true;
        resetResultados();
    }

    checkHealth();
</script>
</body>
</html>
