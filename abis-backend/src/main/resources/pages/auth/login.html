<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABIS-UPC | Iniciar Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
    <link rel="stylesheet" href="../../styles/login.css">
    <link rel="stylesheet" href="../../styles/toast.css">
</head>
<body>
    <main class="login-card" aria-label="Inicio de sesión ABIS-UPC">
        <img src="/assets/img/ABIS-UPC-LOGO.png" alt="ABIS UPC" class="login-logo">
        <h1 class="login-title">Bienvenido</h1>
        <p class="login-subtitle">Todo el proceso electoral, en un solo lugar.</p>

        <form id="login-form" class="login-form">

            <label class="form-group" for="usuario">
                <span class="form-label">Usuario</span>
                <span class="input-shell">
                    <span class="material-symbols-outlined">account_circle</span>
                    <input type="text" id="usuario" placeholder="Ingresa tu usuario" required autocomplete="username" maxlength="20" data-validate="required|username" style="width:100%;background:transparent;border:0;font-family:inherit;font-size:16px;font-weight:500;height:56px;min-width:0;outline:none;">
                </span>
                <small id="usuario-error" style="display:block;font-size:0.75rem;color:#dc2626;font-weight:600;margin-top:4px;min-height:18px;"></small>
            </label>

            <label class="form-group" for="password">
                <span class="form-label">Contraseña</span>
                <span class="input-shell">
                    <span class="material-symbols-outlined">lock</span>
                    <input type="password" id="password" placeholder="Ingresa tu contraseña" required autocomplete="current-password" maxlength="25" data-validate="required|password" style="width:100%;background:transparent;border:0;font-family:inherit;font-size:16px;font-weight:500;height:56px;min-width:0;outline:none;">
                    <button type="button" id="toggle-password" class="toggle-password" aria-label="Mostrar contraseña">
                        <span class="material-symbols-outlined">visibility</span>
                    </button>
                </span>
                <small id="password-error" style="display:block;font-size:0.75rem;color:#dc2626;font-weight:600;margin-top:4px;min-height:18px;"></small>
            </label>

            <div class="form-meta">
                <label class="remember">
                    <input type="checkbox" id="remember">
                    <span>Recordarme</span>
                </label>
                <a href="#" class="forgot-link" id="forgot-link">Olvidaste tu contraseña?</a>
            </div>

            <div id="recover-section" class="recover-section" style="display:none;">
                <p class="recover-text">Ingresa tu usuario para solicitar la recuperacion de contrasena.</p>
                <label class="form-group" for="recover-usuario">
                    <span class="form-label">Usuario</span>
                    <span class="input-shell">
                        <span class="material-symbols-outlined">account_circle</span>
                        <input type="text" id="recover-usuario" placeholder="Ingresa tu usuario" autocomplete="username">
                    </span>
                </label>
                <button type="button" class="btn-login btn-recover" id="btn-recover">Enviar solicitud</button>
                <button type="button" class="btn-link" id="btn-back-login">Volver al inicio de sesion</button>
                <p id="recover-msg" class="recover-msg" style="display:none;"></p>
            </div>

            <button type="submit" class="btn-login" id="btn-submit">Ingresar</button>
        </form>

        <p class="footer-text">ABIS-UPC © Universidad Popular del Cesar</p>
    </main>
    <script src="../../js/form-validation.js"></script>
    <script src="../../js/toast.js"></script>
    <script src="../../js/login.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const form = document.getElementById('login-form');
        if (form) {
          FormValidator.setupForm(form, {
            validateOn: 'blur',
            onSubmit: () => {
              const btn = document.getElementById('btn-submit');
              if (btn && typeof login === 'function') login();
              return false;
            }
          });
        }
      });
    </script>
</body>
</html>
