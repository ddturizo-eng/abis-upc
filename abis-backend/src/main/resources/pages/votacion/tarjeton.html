<section id="screen-ballot" class="kiosk-screen hidden">
  <header class="ballot-sticky-header">
    <div class="ballot-brand"><i class="ti ti-ballot"></i><span>ABIS - UPC</span></div>
    <div class="ballot-heading">
      <h2 id="ballot-election-name">Seleccione su candidato</h2>
      <p>Tarjeton Electronico</p>
    </div>
    <div id="ballot-current-cargo" class="ballot-current-cargo">CARGO A ELEGIR</div>
  </header>
  <div class="ballot-instruction"><i class="ti ti-circle-dot"></i><span id="vote-selection-status">Seleccione un candidato para votar</span></div>
  <div id="vote-ballot" class="kiosk-ballot"></div>
  <div class="ballot-security"><i class="ti ti-shield-check"></i> Tu voto es secreto y esta protegido por encriptacion de nivel electoral.</div>
  <div class="ballot-footer">
    <button id="btn-ballot-back" type="button" class="kiosk-secondary-action"><i class="ti ti-arrow-left"></i> Volver</button>
    <div class="ballot-footer-brand">ABIS-UPC — Transparencia, Seguridad y Confianza</div>
    <button id="btn-vote-submit" type="button" disabled>
      <i class="ti ti-circle-check"></i>
      Confirmar voto
    </button>
  </div>
</section>
